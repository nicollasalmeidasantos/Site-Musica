<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Musicas</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <main>
        <div class="divmododark">
            <button id="botmododark" onclick="mododark()"><img class="botao" alt="botao on e off dark" src="icons/sunny_40dp_E3E3E3_FILL0_wght400_GRAD0_opsz40.png"></button>
        </div>
            <div class="fundo"></div>
            <div class="txtop"><h1>Top 10 musicas de 2013</h1></div>
            <div class="containerprincipal">
                <div id="subcont" class="subconteudo">
                    <div class="imagemalbum">
                        <img id="imagemalbum" alt="Imagem do album" src="imgs/Mirrors_(Justin_Timberlake_song).png">
                    </div>
                    <div class="nomemusica">
                        <p id="nomemusica">Rust in Peace</p>
                    </div>
                </div>
            </div>
            <div class="botoesprogregr">
                <button id="botaoregr" onclick="musicaanter()"><</button>
                <button id="botaomenos" onclick="volume(0)">-</button>
                <button id="botaoplay" onclick="play()"><img id="botaoplayimg" src="icons/play_circle_70dp_E3E3E3_FILL0_wght400_GRAD0_opsz48.png"></button> 
                <button id="botaomais" onclick="volume(1)">+</button>               
                <button id="botaoprog" onclick="proxmusica()">></button>
            </div>
        </main>
        <audio id="audio">
            <source id="source" src="musica/Thrift-shop.mp3" type="audio/mp3">
        </audio>
        <footer>
            <div id="botaodesc" class="">
            <button class="descr" onclick="document.getElementById('botaodesc').classList.toggle('irlado');document.getElementById('pdesc').classList.toggle('aparecer');">Detalhes</button>
            <p id="pdesc">Todo esse projeto foi feito sem código de IA generativa</p>
        </div>
        </footer>
    </body>
    <script src="javascript.js" defer></script>
</html>
